name: Flutter Build Test

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'windows/**'
      - 'linux/**'
      - 'android/**'
      - 'ios/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.fvmrc'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'windows/**'
      - 'linux/**'
      - 'android/**'
      - 'ios/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.fvmrc'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
  workflow_dispatch:
    # 手動実行時にビルドモード（debug, profile, release）を選択可能にする
    inputs:
      build_mode:
        description: 'Build Mode'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - profile
          - release

permissions:
  contents: read
  actions: read

jobs:
  analyze_and_test:
    name: Lint and Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify code formatting
        # 実際にフォーマットを適用し、git diff で崩れている箇所をログに出力して可視化します
        run: |
          dart format .
          git diff --color
          git diff --quiet --exit-code
        continue-on-error: true

      - name: Revert formatting changes
        # 後続ステップがクリーンなオリジナルコードで実行されるよう作業ツリーを復元します
        if: always()
        run: git checkout -- .

      - name: Verify static analysis
        # warningやinfoは許容し、コンパイル不能な致命的エラー（error）のみでCIを失敗させる
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Install test environment dependencies (Linux)
        # APT一時エラー対策。updateは1回のみ実行し、installを安全に最大3回リトライ
        run: |
          sudo apt-get update || true
          for i in {1..3}; do
            if sudo apt-get install -y --no-install-recommends xvfb; then
              echo "Xvfb installed successfully."
              exit 0
            fi
            echo "Xvfb install failed, retrying in 5 seconds... (Attempt $i)"
            sleep 5
          done
          exit 1

      - name: Run widget/unit tests (with virtual framebuffer)
        # 仮想スクリーン環境下でテストを走らせることで、GUI関連テストのクラッシュを防止
        run: xvfb-run flutter test

  build_windows:
    name: Build for Windows
    needs: analyze_and_test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Print light environment metadata
        # 成功/失敗時の比較用に、一瞬で終わる軽量な環境情報をログに残します（ツールの欠損でCIが落ちないよう保護）
        run: |
          flutter --version || true
          cmake --version || true
          ninja --version || true

      - name: Build Windows App
        # workflow_dispatch時は選択されたモード、自動実行時はreleaseモードでビルド
        env:
          BUILD_MODE: ${{ inputs.build_mode || 'release' }}
        run: flutter build windows --"$env:BUILD_MODE"

      - name: Run detailed environment diagnostics on failure
        # ビルド失敗時のみ、詳細な診断を実行して異常箇所を特定します
        if: failure()
        run: flutter doctor -v

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-merger-windows
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

  build_linux:
    name: Build for Linux
    needs: analyze_and_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install Linux build dependencies
        # APT一時エラー対策。updateは1回のみ実行し、installを安全に最大3回リトライすることで
        # ネットワーク瞬断への耐性を上げつつ、無駄なupdate時間を削減します。
        run: |
          sudo apt-get update || true
          for i in {1..3}; do
            if sudo apt-get install -y --no-install-recommends clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libblkid-dev libsecret-1-dev; then
              echo "Apt dependencies installed successfully."
              exit 0
            fi
            echo "Apt install failed, retrying in 5 seconds... (Attempt $i)"
            sleep 5
          done
          exit 1

      - name: Install dependencies
        run: flutter pub get

      - name: Print light environment metadata
        # 成功/失敗時の比較用に、一瞬で終わる軽量な環境情報をログに残します（ツールの欠損でCIが落ちないよう保護）
        run: |
          flutter --version || true
          cmake --version || true
          ninja --version || true

      - name: Build Linux App
        # workflow_dispatch時は選択されたモード、自動実行時はreleaseモードでビルド
        env:
          BUILD_MODE: ${{ inputs.build_mode || 'release' }}
        run: flutter build linux --"$BUILD_MODE"

      - name: Run detailed environment diagnostics on failure
        # ビルド失敗時のみ、詳細な診断を実行して異常箇所を特定します
        if: failure()
        run: flutter doctor -v

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-merger-linux
          path: build/linux/x64/release/bundle/
          if-no-files-found: error

  build_android:
    name: Build for Android
    needs: analyze_and_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Print light environment metadata
        # 成功/失敗時の比較用に、一瞬で終わる軽量な環境情報をログに残します（ツールの欠損でCIが落ちないよう保護）
        run: |
          flutter --version || true
          java --version || true

      - name: Build Android APK
        # workflow_dispatch時は選択されたモード、自動実行時はreleaseモードでビルド
        env:
          BUILD_MODE: ${{ inputs.build_mode || 'release' }}
        run: flutter build apk --"$BUILD_MODE"

      - name: Run detailed environment diagnostics on failure
        # ビルド失敗時のみ、詳細な診断を実行して異常箇所を特定します
        if: failure()
        run: flutter doctor -v

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-merger-android
          path: build/app/outputs/flutter-apk/app-*.apk
          if-no-files-found: error

  build_ios:
    name: Build for iOS
    needs: analyze_and_test
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Print light environment metadata
        # 成功/失敗時の比較用に、一瞬で終わる軽量な環境情報をログに残します（ツールの欠損でCIが落ちないよう保護）
        run: |
          flutter --version || true
          xcodebuild -version || true

      - name: Build iOS App
        # 開発用署名なしでiOSアプリをビルド（CI検証用）
        env:
          BUILD_MODE: ${{ inputs.build_mode || 'release' }}
        run: flutter build ios --no-codesign --"$BUILD_MODE"

      - name: Run detailed environment diagnostics on failure
        # ビルド失敗時のみ、詳細な診断を実行して異常箇所を特定します
        if: failure()
        run: flutter doctor -v

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-merger-ios
          path: build/ios/iphoneos/
          if-no-files-found: error

  build_web:
    name: Build for Web
    needs: analyze_and_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Print light environment metadata
        # 成功/失敗時の比較用に、一瞬で終わる軽量な環境情報をログに残します（ツールの欠損でCIが落ちないよう保護）
        run: |
          flutter --version || true

      - name: Build Web App
        env:
          BUILD_MODE: ${{ inputs.build_mode || 'release' }}
        run: flutter build web --"$BUILD_MODE"

      - name: Run detailed environment diagnostics on failure
        # ビルド失敗時のみ、詳細な診断を実行して異常箇所を特定します
        if: failure()
        run: flutter doctor -v

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-merger-web
          path: build/web/
          if-no-files-found: error

  timeline:
    name: Timeline
    needs: [analyze_and_test, build_windows, build_linux, build_android, build_ios, build_web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Actions Timeline
        uses: Kesin11/actions-timeline@v2
